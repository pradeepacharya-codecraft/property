<div class="overlay" [class.active]="PanelSignal()" (click)="!isEditMode && hidePanel()">
  <div
    class="panel"
    [class.active]="PanelSignal()"
    (click)="$event.stopPropagation()"
    cdkTrapFocus
    cdkTrapFocusAutoCapture
  >
    <h2>{{ isEditMode ? 'Edit Location' : 'Add Location' }}</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label>Name</label>
      <input formControlName="name" />

      <label>City</label>
      <input formControlName="city" />

      <label>State</label>
      <input formControlName="state" />

      <label>Photo URL</label>
      <input formControlName="photo" />

      <label>Available Units</label>
      <input type="number" formControlName="availableUnits" />

      <label class="checkbox">
        <input type="checkbox" formControlName="wifi" />
        WiFi
      </label>

      <label class="checkbox">
        <input type="checkbox" formControlName="laundry" />
        Laundry
      </label>

      <div class="actions">
        <button type="submit" [disabled]="form.invalid">
          {{ isEditMode ? 'Update' : 'Add' }}
        </button>

        <button type="button" (click)="form.reset()">Reset</button>

        <button type="button" (click)="hidePanel()">Cancel</button>
      </div>
    </form>
  </div>
</div>

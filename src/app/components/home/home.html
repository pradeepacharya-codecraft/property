<section class="container">
  <!-- 🔍 Search -->
  <form class="search-bar">
    <input type="text" placeholder="Filter by city" />
    <button class="primary" type="button">Search</button>
  </form>

  <section class="controls">
    <label class="edit-toggle">
      <input type="checkbox" [checked]="mode() === 'edit'" (change)="handleCheckbox($event)" />
      <span>Edit Mode</span>
    </label>

    <p class="mode-text">
      {{ mode() === 'edit' ? 'Select items to delete' : 'Normal Mode' }}
    </p>

    <button
      class="delete-btn"
      (click)="deleteSelected()"
      [disabled]="mode() !== 'edit' || selectedItems.size === 0"
    >
      Delete Selected ({{ selectedItems.size }})
    </button>
    <button class="restore-btn" (click)="restoreAll()" [disabled]="!locationService.hasChanges()">
      Restore All
    </button>
  </section>

  <section class="results">
    @for (housingLocation of housingLocationList; track housingLocation.id) {
      <div
        class="card-wrapper"
        [class.selected]="selectedItems.has(housingLocation.id)"
        (click)="onSelect(housingLocation)"
      >
        <app-housing-location [housingLocation]="housingLocation"> </app-housing-location>
      </div>
    } @empty {
      <p class="empty-state">No housing locations found.</p>
    }
  </section>
</section>

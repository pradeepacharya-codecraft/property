<app-card-layout>
  <button class="card-container" [class.selected]="selected()" (click)="handleClick()">
    <section class="listing">
      @if (housingLocation().wifi) {
        <img class="wifi-photo" src="../../../../public/wifi_image.jpg" alt="wifi" />
      }

      <img
        class="listing-photo"
        [src]="housingLocation().photo"
        alt="Exterior photo of {{ housingLocation().name }}"
      />

      <h2 class="listing-heading">{{ housingLocation().name }}</h2>
      <p class="listing-location">{{ housingLocation().city }}, {{ housingLocation().state }}</p>
      @if (isEditMode()) {
        <button class="edit-btn" type="button" (click)="editLocation($event)">Edit</button>
      }
    </section>
  </button>
</app-card-layout>
